<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Pipeline Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --green: #3fb950;
  --blue: #58a6ff;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--blue); }
.header-actions { display: flex; gap: 8px; }
button {
  background: var(--bg-hover);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
}
button:hover { background: var(--border); }
button.primary { background: var(--blue); color: #000; border-color: var(--blue); font-weight: 600; }
button.primary:hover { opacity: 0.9; }
button.danger { background: var(--red); color: #fff; border-color: var(--red); }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* New Run Form */
.new-run-form {
  max-width: 700px;
  margin: 60px auto;
  padding: 24px;
}
.new-run-form h2 { margin-bottom: 16px; font-size: 20px; }
.new-run-form textarea {
  width: 100%;
  height: 200px;
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
}
.new-run-form textarea:focus { outline: none; border-color: var(--blue); }
.new-run-form .actions { margin-top: 12px; display: flex; gap: 8px; }

/* Run List */
.run-list {
  max-width: 800px;
  margin: 40px auto;
  padding: 0 24px;
}
.run-list h2 { margin-bottom: 16px; font-size: 20px; }
.run-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
}
.run-item:hover { border-color: var(--blue); }
.run-item .meta { font-size: 13px; color: var(--text-muted); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.badge-completed { background: var(--green); color: #000; }
.badge-active, .badge-in_progress { background: var(--blue); color: #000; }
.badge-awaiting_approval { background: var(--orange); color: #000; }
.badge-gate_failed, .badge-failed { background: var(--red); color: #fff; }
.badge-halted { background: var(--red); color: #fff; }
.badge-pending { background: var(--border); color: var(--text-muted); }

/* Pipeline view */
.pipeline-view { padding: 0 24px 80px; }

/* Phase bar */
.phase-bar {
  display: flex;
  gap: 4px;
  padding: 20px 0;
  overflow-x: auto;
}
.phase-box {
  flex: 1;
  min-width: 110px;
  text-align: center;
  padding: 10px 8px;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.phase-box.completed { border-color: var(--green); background: rgba(63,185,80,0.1); color: var(--green); }
.phase-box.active { border-color: var(--blue); background: rgba(88,166,255,0.1); color: var(--blue); animation: pulse 2s infinite; }
.phase-box.awaiting_approval { border-color: var(--orange); background: rgba(210,153,34,0.1); color: var(--orange); }
.phase-box.failed { border-color: var(--red); background: rgba(248,81,73,0.1); color: var(--red); }
.phase-box.selected { box-shadow: 0 0 0 2px var(--purple); }
.phase-arrow { display: flex; align-items: center; color: var(--text-muted); font-size: 16px; padding: 0 2px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Main content split */
.content-split {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 16px;
  min-height: 500px;
}

/* Feature sidebar */
.feature-sidebar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  overflow-y: auto;
  max-height: 70vh;
}
.feature-sidebar h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
.feature-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.feature-item:hover { background: var(--bg-hover); }
.feature-item.selected { background: var(--bg-hover); border-left: 3px solid var(--blue); }
.feature-item .priority { color: var(--text-muted); font-size: 11px; }

/* Detail panel */
.detail-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  overflow-y: auto;
  max-height: 70vh;
}
.detail-panel h3 { font-size: 15px; margin-bottom: 12px; }
.detail-empty { color: var(--text-muted); padding: 40px; text-align: center; }

/* Result card */
.result-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
}
.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
}
.result-header:hover { background: var(--bg-hover); }
.result-header .agent-name { font-weight: 600; }
.result-header .model-info { color: var(--text-muted); font-size: 12px; }
.result-header .status-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
.status-success { background: var(--green); }
.status-failed { background: var(--red); }
.result-body {
  display: none;
  padding: 12px;
  border-top: 1px solid var(--border);
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
  color: var(--text-muted);
}
.result-body.open { display: block; }

/* Verdict card */
.verdict-card {
  padding: 10px 14px;
  border-radius: 6px;
  margin-bottom: 8px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.verdict-pass { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); }
.verdict-fail { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); }
.verdict-icon { font-weight: 700; }

/* Approval bar */
.approval-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-top: 2px solid var(--orange);
  padding: 16px 24px;
  z-index: 100;
}
.approval-bar.visible { display: block; }
.approval-bar .bar-content {
  max-width: 1200px;
  margin: 0 auto;
}
.approval-bar .status-msg {
  font-size: 14px;
  margin-bottom: 10px;
  color: var(--orange);
  font-weight: 600;
}
.approval-bar .bar-actions { display: flex; gap: 8px; align-items: flex-start; }
.approval-bar textarea {
  flex: 1;
  height: 40px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}
.approval-bar textarea:focus { outline: none; border-color: var(--blue); }

/* Brief display */
.brief-banner {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 13px;
}
.brief-banner strong { color: var(--text-muted); font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 8px 0 16px;
  font-size: 13px;
  color: var(--text-muted);
}
.stats-bar .stat { display: flex; gap: 4px; }
.stats-bar .stat-val { color: var(--text); font-weight: 600; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--text-muted); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Markdown rendered output */
.result-body.markdown-rendered {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  white-space: normal;
  font-size: 13px;
}
.result-body.markdown-rendered h1,
.result-body.markdown-rendered h2,
.result-body.markdown-rendered h3,
.result-body.markdown-rendered h4 {
  color: var(--text);
  margin: 12px 0 6px;
}
.result-body.markdown-rendered h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.result-body.markdown-rendered h2 { font-size: 16px; }
.result-body.markdown-rendered h3 { font-size: 14px; }
.result-body.markdown-rendered p { margin: 6px 0; }
.result-body.markdown-rendered ul,
.result-body.markdown-rendered ol { margin: 6px 0; padding-left: 20px; }
.result-body.markdown-rendered li { margin: 2px 0; }
.result-body.markdown-rendered code {
  background: rgba(110,118,129,0.2);
  padding: 2px 5px;
  border-radius: 3px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
}
.result-body.markdown-rendered pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  overflow-x: auto;
  margin: 8px 0;
}
.result-body.markdown-rendered pre code {
  background: none;
  padding: 0;
}
.result-body.markdown-rendered blockquote {
  border-left: 3px solid var(--purple);
  padding-left: 12px;
  color: var(--text-muted);
  margin: 8px 0;
}
.result-body.markdown-rendered table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
}
.result-body.markdown-rendered th,
.result-body.markdown-rendered td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  font-size: 12px;
  text-align: left;
}
.result-body.markdown-rendered th { background: var(--bg-hover); }
.result-body.markdown-rendered a { color: var(--blue); }
.result-body.markdown-rendered hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span>NEXUS</span> Pipeline Dashboard</h1>
  <div class="header-actions">
    <button onclick="showView('runs')">Runs</button>
    <button class="primary" onclick="showView('new-run')">+ New Run</button>
  </div>
</div>

<!-- View: New Run -->
<div id="view-new-run" class="view">
  <div class="new-run-form">
    <h2>Start New Pipeline Run</h2>
    <textarea id="brief-input" placeholder="Describe your project...&#10;&#10;Example: Build a SaaS task manager with auth, billing, team workspaces, and real-time collaboration"></textarea>
    <div class="actions">
      <button class="primary" onclick="startRun()">Start Pipeline</button>
      <button onclick="showView('runs')">Cancel</button>
    </div>
  </div>
</div>

<!-- View: Run List -->
<div id="view-runs" class="view">
  <div class="run-list">
    <h2>Pipeline Runs</h2>
    <div id="runs-container"><div class="loading"><div class="spinner"></div><br>Loading runs...</div></div>
  </div>
</div>

<!-- View: Pipeline Dashboard -->
<div id="view-pipeline" class="view">
  <div class="pipeline-view">
    <!-- Brief -->
    <div id="brief-banner" class="brief-banner" style="display:none">
      <strong>Project Brief</strong>
      <span id="brief-text"></span>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">Run: <span class="stat-val" id="stat-run-id">-</span></div>
      <div class="stat">Results: <span class="stat-val" id="stat-results">0</span></div>
      <div class="stat">Verdicts: <span class="stat-val" id="stat-verdicts">0</span></div>
      <div class="stat">Phase: <span class="stat-val" id="stat-phase">-</span></div>
    </div>

    <!-- Phase bar -->
    <div id="phase-bar" class="phase-bar"></div>

    <!-- Content split -->
    <div class="content-split">
      <div class="feature-sidebar">
        <h3>Features</h3>
        <div id="feature-list"></div>
      </div>
      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty">Select a phase and feature to view results</div>
      </div>
    </div>
  </div>
</div>

<!-- Approval bar -->
<div id="approval-bar" class="approval-bar">
  <div class="bar-content">
    <div class="status-msg" id="approval-msg">Phase complete - waiting for approval</div>
    <div class="bar-actions">
      <textarea id="feedback-input" placeholder="Optional: provide feedback or changes..."></textarea>
      <button class="primary" onclick="approveRun()">Approve &amp; Continue</button>
      <button onclick="sendFeedback()">Send Feedback &amp; Continue</button>
    </div>
  </div>
</div>

<script>
// State
let currentRunId = null;
let currentState = null;
let selectedPhase = null;
let selectedFeature = null;  // null = all features
let eventSource = null;

// Views
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'runs') loadRuns();
  if (name === 'new-run') document.getElementById('brief-input').focus();
}

// Start run
async function startRun() {
  const brief = document.getElementById('brief-input').value.trim();
  if (!brief) return;
  try {
    const resp = await fetch('/api/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brief })
    });
    const data = await resp.json();
    if (data.run_id) {
      openRun(data.run_id);
    }
  } catch (e) {
    alert('Failed to start run: ' + e.message);
  }
}

// Load runs
async function loadRuns() {
  try {
    const resp = await fetch('/api/runs');
    const data = await resp.json();
    const container = document.getElementById('runs-container');
    if (!data.runs || data.runs.length === 0) {
      container.innerHTML = '<div class="detail-empty">No runs yet. Start a new one!</div>';
      return;
    }
    container.innerHTML = data.runs.map(r => `
      <div class="run-item" onclick="openRun('${r.run_id}')">
        <div>
          <div style="font-weight:600">${r.run_id}</div>
          <div class="meta">${r.brief_preview || 'No brief'}</div>
        </div>
        <div>
          <span class="badge badge-${r.status.toLowerCase()}">${r.status.replace('_', ' ')}</span>
          <span class="meta" style="margin-left:8px">Phase: ${r.current_phase || '-'}</span>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('runs-container').innerHTML = '<div class="detail-empty">Failed to load runs</div>';
  }
}

// Open a run
function openRun(runId) {
  currentRunId = runId;
  selectedPhase = null;
  selectedFeature = null;
  showView('pipeline');

  // Close existing SSE
  if (eventSource) eventSource.close();

  // Show loading
  document.getElementById('detail-panel').innerHTML = '<div class="loading"><div class="spinner"></div><br>Connecting to pipeline...</div>';

  // Connect SSE
  eventSource = new EventSource('/api/runs/' + runId + '/stream');
  eventSource.onmessage = (e) => {
    const state = JSON.parse(e.data);
    currentState = state;
    renderPipeline(state);
  };
  eventSource.onerror = () => {
    // Try to load state once via REST
    fetch('/api/runs/' + runId)
      .then(r => r.json())
      .then(state => { currentState = state; renderPipeline(state); })
      .catch(() => {});
  };
}

// Render pipeline
function renderPipeline(state) {
  // Brief
  const banner = document.getElementById('brief-banner');
  if (state.project_brief) {
    banner.style.display = 'block';
    document.getElementById('brief-text').textContent = state.project_brief;
  }

  // Stats
  document.getElementById('stat-run-id').textContent = state.run_id || '-';
  document.getElementById('stat-results').textContent = state.total_results || 0;
  document.getElementById('stat-verdicts').textContent = state.total_verdicts || 0;
  document.getElementById('stat-phase').textContent = state.current_phase || '-';

  // Phase bar
  renderPhaseBar(state);

  // Features
  renderFeatures(state);

  // Auto-select the current/latest phase
  if (!selectedPhase && state.current_phase) {
    selectedPhase = state.current_phase;
  }

  // Detail
  renderDetail(state);

  // Approval bar
  renderApprovalBar(state);
}

function renderPhaseBar(state) {
  const bar = document.getElementById('phase-bar');
  const phases = state.phases || [];
  const statuses = state.phase_statuses || {};

  bar.innerHTML = phases.map((p, i) => {
    const s = statuses[p] || 'pending';
    const sel = p === selectedPhase ? ' selected' : '';
    const arrow = i < phases.length - 1 ? '<div class="phase-arrow">&#9654;</div>' : '';
    return `<div class="phase-box ${s}${sel}" onclick="selectPhase('${p}')">${p}</div>${arrow}`;
  }).join('');
}

function renderFeatures(state) {
  const list = document.getElementById('feature-list');
  const features = state.features || [];
  if (features.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px">Waiting for decomposition...</div>';
    return;
  }

  list.innerHTML = `<div class="feature-item ${selectedFeature === null ? 'selected' : ''}" onclick="selectFeature(null)">All features</div>` +
    features.map(f => {
      const sel = selectedFeature === f.id ? ' selected' : '';
      return `<div class="feature-item${sel}" onclick="selectFeature('${f.id}')">
        <span>${f.title || f.id}</span>
        <span class="priority">p${f.priority || '?'}</span>
      </div>`;
    }).join('');
}

function renderDetail(state) {
  const panel = document.getElementById('detail-panel');
  if (!selectedPhase) {
    // Show overview of all phases
    panel.innerHTML = renderOverview(state);
    return;
  }

  const phaseResults = state.results_grouped?.[selectedPhase] || {};
  const phaseVerdicts = state.verdicts_grouped?.[selectedPhase] || [];

  let html = `<h3>Phase: ${selectedPhase.toUpperCase()}</h3>`;

  // Filter by feature if selected
  const featureIds = selectedFeature ? [selectedFeature] : Object.keys(phaseResults);

  if (featureIds.length === 0) {
    html += '<div class="detail-empty">No results for this phase yet</div>';
    panel.innerHTML = html;
    return;
  }

  for (const fid of featureIds) {
    const results = phaseResults[fid] || [];
    const verdict = phaseVerdicts.find(v => v.feature_id === fid);
    const feature = (state.features || []).find(f => f.id === fid);

    html += `<div style="margin-bottom:16px">`;
    html += `<div style="font-weight:600;font-size:14px;margin-bottom:8px;color:var(--purple)">${feature?.title || fid}</div>`;

    // Results
    for (const r of results) {
      const id = `result-${r.phase}-${r.feature_id}-${r.agent_name}`.replace(/[^a-zA-Z0-9-]/g, '_');
      const rendered = renderOutput(r.output || '');
      const mdClass = rendered.isMarkdown ? ' markdown-rendered' : '';
      html += `<div class="result-card">
        <div class="result-header" onclick="toggleResult('${id}')">
          <div>
            <span class="status-icon status-${r.status || 'success'}"></span>
            <span class="agent-name">${r.agent_name}</span>
          </div>
          <span class="model-info">${r.model_used || '?'} (${r.model_tier || '?'})</span>
        </div>
        <div class="result-body${mdClass}" id="${id}">${rendered.html}</div>
      </div>`;
    }

    // Verdict
    if (verdict) {
      const cls = verdict.passed ? 'verdict-pass' : 'verdict-fail';
      const icon = verdict.passed ? 'PASS' : 'FAIL';
      html += `<div class="verdict-card ${cls}">
        <span class="verdict-icon">[${icon}]</span>
        <span>${escapeHtml(verdict.reason || '')}</span>
        <span style="margin-left:auto;color:var(--text-muted);font-size:11px">${verdict.reviewed_by || ''}</span>
      </div>`;
    }

    html += `</div>`;
  }

  panel.innerHTML = html;
}

function renderOverview(state) {
  let html = '<h3>Pipeline Overview</h3>';
  const phases = state.phases || [];
  const statuses = state.phase_statuses || {};

  for (const p of phases) {
    const s = statuses[p] || 'pending';
    const results = state.results_grouped?.[p] || {};
    const verdicts = state.verdicts_grouped?.[p] || [];
    const resultCount = Object.values(results).reduce((sum, arr) => sum + arr.length, 0);
    const passCount = verdicts.filter(v => v.passed).length;
    const failCount = verdicts.filter(v => !v.passed).length;

    html += `<div style="margin-bottom:12px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer" onclick="selectPhase('${p}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600;text-transform:uppercase">${p}</span>
        <span class="badge badge-${s}">${s.replace('_', ' ')}</span>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
        ${resultCount} results | ${passCount} passed | ${failCount} failed
      </div>
    </div>`;
  }
  return html;
}

// Actions
function selectPhase(phase) {
  selectedPhase = phase;
  if (currentState) renderPipeline(currentState);
}

function selectFeature(fid) {
  selectedFeature = fid;
  if (currentState) renderPipeline(currentState);
}

function toggleResult(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

async function approveRun() {
  if (!currentRunId) return;
  try {
    await fetch(`/api/runs/${currentRunId}/approve`, { method: 'POST' });
    document.getElementById('approval-bar').classList.remove('visible');
  } catch (e) {
    alert('Failed to approve: ' + e.message);
  }
}

async function sendFeedback() {
  if (!currentRunId) return;
  const feedback = document.getElementById('feedback-input').value.trim();
  if (!feedback) { alert('Please enter feedback'); return; }
  try {
    await fetch(`/api/runs/${currentRunId}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback })
    });
    document.getElementById('feedback-input').value = '';
    document.getElementById('approval-bar').classList.remove('visible');
  } catch (e) {
    alert('Failed to send feedback: ' + e.message);
  }
}

function renderApprovalBar(state) {
  const bar = document.getElementById('approval-bar');
  const msg = document.getElementById('approval-msg');
  if (state.should_halt && state.halt_reason) {
    bar.classList.add('visible');
    if (state.halt_reason.startsWith('AWAITING_APPROVAL:')) {
      msg.textContent = state.halt_reason.replace('AWAITING_APPROVAL: ', '');
      msg.style.color = 'var(--orange)';
    } else if (state.halt_reason.startsWith('GATE_FAILED:')) {
      msg.textContent = state.halt_reason.replace('GATE_FAILED: ', '');
      msg.style.color = 'var(--red)';
    } else {
      msg.textContent = state.halt_reason;
    }
  } else {
    bar.classList.remove('visible');
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function looksLikeMarkdown(str) {
  if (!str) return false;
  const markers = [
    /^#{1,6}\s/m,           // headings
    /\*\*.+?\*\*/,          // bold
    /\[.+?\]\(.+?\)/,       // links
    /^[\-\*]\s/m,           // unordered list
    /^\d+\.\s/m,            // ordered list
    /^```/m,                // code fences
    /^\|.+\|/m,             // tables
    /^>\s/m,                // blockquotes
  ];
  let hits = 0;
  for (const re of markers) {
    if (re.test(str)) hits++;
  }
  return hits >= 2;
}

function renderOutput(str) {
  if (looksLikeMarkdown(str)) {
    return { html: marked.parse(str), isMarkdown: true };
  }
  return { html: escapeHtml(str), isMarkdown: false };
}

// Init
showView('runs');
